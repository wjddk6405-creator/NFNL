<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Cursor Hover Ripple (Fixed)</title>
    <style>
      body {
        margin: 0;
        height: 100%;
        background: #101010;
        cursor: none;
      }

      .cursor {
        position: fixed;
        width: 50px;
        height: 50px;
        pointer-events: none;
        transform: translate(-50%, -50%);
        z-index: 9999;
      }

      .cursor img {
        width: 100%;
        height: 100%;
      }

      /* ripple (+ GLOW) */
      .ripple {
        position: fixed;
        border-radius: 50%;
        border: 2px solid rgba(255, 0, 0, 0.9);
        box-shadow:
          0 0 6px rgba(255, 0, 0, 0.8),
          0 0 24px rgba(255, 0, 0, 0.6),
          0 0 48px rgba(255, 0, 0, 0.4);
        filter: blur(2px);
        pointer-events: none;
        transform: translate(-50%, -50%);
        /* 번지는 속도 조절 */
        animation: rippleEffect 1.5s ease-out forwards;
        /* 추가로 아래 js도 조절 */
      }

      @keyframes rippleEffect {
        0% {
          width: 15px;
          height: 15px;
          opacity: 1;
          box-shadow:
            0 0 4px rgba(255, 0, 0, 0.9),
            0 0 8px rgba(255, 0, 0, 0.7);
        }
        100% {
          width: 120px;
          height: 120px;
          opacity: 0;
          box-shadow:
            0 0 20px rgba(255, 0, 0, 0.4),
            0 0 40px rgba(255, 0, 0, 0.2),
            0 0 60px rgba(255, 0, 0, 0.1);
        }
      }

      /* click ripple (burst) */
      .click-ripple {
        position: fixed;
        border-radius: 50%;
        border: 3px solid rgba(255, 0, 0, 1);
        pointer-events: none;
        transform: translate(-50%, -50%);
        animation: clickRipple 0.6s ease-out forwards;
        filter: blur(3px);
        box-shadow:
          0 0 10px rgba(255, 0, 0, 1),
          0 0 30px rgba(255, 0, 0, 0.8),
          0 0 60px rgba(255, 0, 0, 0.6);
      }

      @keyframes clickRipple {
        0% {
          width: 30px;
          height: 30px;
          opacity: 1;
          box-shadow:
            0 0 20px rgba(255, 0, 0, 1),
            0 0 40px rgba(255, 0, 0, 0.9);
        }
        100% {
          width: 200px;
          height: 200px;
          opacity: 0;
          box-shadow:
            0 0 40px rgba(255, 0, 0, 0.5),
            0 0 80px rgba(255, 0, 0, 0.3),
            0 0 120px rgba(255, 0, 0, 0.2);
        }
      }

      /* particle */
      .particle {
        position: fixed;
        border-radius: 50%;
        background: red;
        pointer-events: none;
        animation: explode 0.8s ease-out forwards;
      }

      @keyframes explode {
        to {
          transform: translate(var(--x), var(--y));
          opacity: 0;
        }
      }

      .box {
        width: 200px;
        height: 200px;
        background: #444;
        margin: 100px auto;
      }
    </style>
  </head>
  <body>
    <div class="cursor" id="cursor">
      <img id="cursorImg" src="../icons/m1_50_r.png" alt="cursor" />
    </div>

    <div class="box hover-target"></div>
    <div class="box hover-target"></div>
    <div class="box hover-target"></div>
    <div class="box hover-target"></div>

    <script>
      const cursor = document.getElementById("cursor");
      const cursorImg = document.getElementById("cursorImg");
      const targets = document.querySelectorAll(".hover-target");

      let isHover = false;
      let rippleInterval = null;
      let mouseX = 0;
      let mouseY = 0;

      // 마우스 위치 추적
      window.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        cursor.style.left = mouseX + "px";
        cursor.style.top = mouseY + "px";
      });

      // 다중 여러 요소 hover
      targets.forEach((el) => {
        el.addEventListener("mouseenter", () => {
          isHover = true;
          cursorImg.src = "../icons/m1_50_g.png";

          // 일정 간격으로 ripple 생성
          rippleInterval = setInterval(() => {
            createRipple(mouseX, mouseY);
          }, 300);
        });

        // hover 종료
        el.addEventListener("mouseleave", () => {
          isHover = false;
          cursorImg.src = "../icons/m1_50_r.png";
          clearInterval(rippleInterval);
        });
      });

      // ripple
      function createRipple(x, y) {
        const ripple = document.createElement("div");
        ripple.className = "ripple";
        ripple.style.left = x + "px";
        ripple.style.top = y + "px";
        document.body.appendChild(ripple);
        // 번지는 속도 조절
        setTimeout(() => ripple.remove(), 1500);
      }
      // click ripple
      function createClickRipple(x, y) {
        const ripple = document.createElement("div");
        ripple.className = "click-ripple";
        ripple.style.left = x + "px";
        ripple.style.top = y + "px";
        document.body.appendChild(ripple);
        setTimeout(() => ripple.remove(), 800);
      }

      // click particle
      function createExplosion(x, y) {
        const colors = ["#ff0000", "#ff0844", "#f83600"];

        for (let i = 0; i < 20; i++) {
          const particle = document.createElement("div");
          particle.className = "particle";

          // 크기 (작/중/대)
          const sizeType = Math.random();
          let size;
          if (sizeType < 0.33) size = 4;
          else if (sizeType < 0.66) size = 8;
          else size = 14;

          particle.style.width = size + "px";
          particle.style.height = size + "px";

          // 색상 랜덤
          const color = colors[Math.floor(Math.random() * colors.length)];
          particle.style.background = color;
          particle.style.boxShadow = `0 0 6px ${color}, 0 0 12px ${color}`;

          // 방향 + 중력 느낌
          const angle = Math.random() * Math.PI * 2;
          const distance = Math.random() * 60 + 30;

          let moveX = Math.cos(angle) * distance;
          let moveY = Math.sin(angle) * distance;

          // 중력 (아래로 더 떨어지게)
          moveY += 60 + Math.random() * 40;

          particle.style.left = x + "px";
          particle.style.top = y + "px";
          particle.style.setProperty("--x", moveX + "px");
          particle.style.setProperty("--y", moveY + "px");

          document.body.appendChild(particle);
          setTimeout(() => particle.remove(), 600);
        }
      }

      // click
      window.addEventListener("mousedown", (e) => {
        cursorImg.src = "../icons/m5_50_r.png";
        createClickRipple(e.clientX, e.clientY);
        createExplosion(e.clientX, e.clientY);
      });

      window.addEventListener("mouseup", () => {
        cursorImg.src = isHover ? "../icons/m1_50_g.png" : "../icons/m1_50_r.png";
      });
    </script>
  </body>
</html>
